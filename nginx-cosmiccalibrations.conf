# Cosmic Calibrations — Nginx server block
# Place at: /etc/nginx/sites-available/cosmiccalibrations
# Then: ln -s /etc/nginx/sites-available/cosmiccalibrations /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name cosmiccalibrations.madmanwithabox.org;

    root /var/www/cosmiccalibrations;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.svg {
        expires 1w;
        add_header Cache-Control "public";
    }

    # Main site — serve static files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security — deny hidden files
    location ~ /\. {
        deny all;
    }

    # Custom 404
    error_page 404 /404.html;

    # Logs
    access_log /var/log/nginx/cosmiccalibrations-access.log;
    error_log /var/log/nginx/cosmiccalibrations-error.log;
}
